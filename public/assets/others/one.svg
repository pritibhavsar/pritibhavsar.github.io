
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      .line { stroke: #193651; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .fill-dark { fill: #193651; }
    </style>
    <!-- Instagram gradient -->
    <linearGradient id="instaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F58529"/>
      <stop offset="30%" stop-color="#DD2A7B"/>
      <stop offset="60%" stop-color="#8134AF"/>
      <stop offset="100%" stop-color="#515BD4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="900" fill="#CDE6F6"/>

  <!-- Left: UI window card -->
  <g id="ui-window" transform="translate(80,120)">
    <rect x="0" y="80" width="800" height="500" rx="30" ry="30" fill="none" stroke="#193651" stroke-width="12"/>
    <rect x="0" y="0" width="800" height="100" rx="30" ry="30" fill="#193651"/>
    <!-- window dots -->
    <circle cx="40" cy="50" r="10" fill="#2a4b68"/>
    <circle cx="80" cy="50" r="10" fill="#2a4b68"/>
    <circle cx="120" cy="50" r="10" fill="#2a4b68"/>

    <!-- Users (nodes) -->
    <g id="nodes" transform="translate(0,120)">
      <!-- left user -->
      <circle cx="200" cy="220" r="110" fill="#A9C8DA" stroke="#193651" stroke-width="12"/>
      <circle cx="200" cy="220" r="55" fill="none" stroke="#193651" stroke-width="12"/>
      <!-- right user -->
      <circle cx="520" cy="220" r="100" fill="#A9C8DA" stroke="#193651" stroke-width="12"/>
      <circle cx="520" cy="220" r="50" fill="none" stroke="#193651" stroke-width="12"/>
      <!-- top small user -->
      <circle cx="340" cy="-40" r="70" fill="#A9C8DA" stroke="#193651" stroke-width="12"/>
      <circle cx="340" cy="-40" r="35" fill="none" stroke="#193651" stroke-width="12"/>

      <!-- connecting lines -->
      <path d="M310 220 L420 220" class="line"/>
      <path d="M340 80 L520 160" class="line"/>
      <path d="M520 320 L600 380" class="line"/>
      <circle cx="610" cy="390" r="32" fill="none" stroke="#193651" stroke-width="12"/>
      <circle cx="630" cy="240" r="32" fill="none" stroke="#193651" stroke-width="12"/>
    </g>

    <!-- analytics bars -->
    <rect x="240" y="540" width="40" height="70" fill="#A9C8DA" stroke="#193651" stroke-width="8"/>
    <rect x="310" y="510" width="40" height="100" fill="#A9C8DA" stroke="#193651" stroke-width="8"/>
    <rect x="380" y="480" width="40" height="130" fill="#A9C8DA" stroke="#193651" stroke-width="8"/>

    <!-- hashtag speech bubble -->
    <g transform="translate(440,530)">
      <rect x="0" y="0" width="200" height="140" rx="28" ry="28" fill="none" stroke="#193651" stroke-width="12"/>
      <path d="M160 140 L160 175 L115 140" fill="none" stroke="#193651" stroke-width="12"/>
      <text x="100" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="80" fill="#193651">#</text>
    </g>
  </g>

  <!-- Decorative: thumbs up -->
  <g transform="translate(270,145)">
    <path d="M0 80 h60 v-60 c0 -20 15 -35 35 -35 h30 v120 h-125 z" fill="#A9C8DA" stroke="#193651" stroke-width="12"/>
    <path d="M125 25 c15 -35 35 -35 50 -20 c20 20 5 45 -5 60 c-10 15 -15 35 -5 55 c10 25 -5 45 -25 45 h-15 v-140 z" fill="#A9C8DA" stroke="#193651" stroke-width="12"/>
  </g>

  <!-- Heart -->
  <path d="M880 160 c0 -60 80 -60 100 -10 c20 -50 100 -50 100 10 c0 70 -100 110 -100 110 s-100 -40 -100 -110z" fill="#A9C8DA" stroke="#193651" stroke-width="10"/>

  <!-- Checkmark badge -->
  <g transform="translate(160,680)">
    <circle cx="200" cy="60" r="65" fill="none" stroke="#193651" stroke-width="12"/>
    <path d="M170 60 l20 20 l40 -45" class="line"/>
  </g>

  <!-- Sprinkles -->
  <circle cx="100" cy="660" r="10" fill="#193651"/>
  <circle cx="540" cy="760" r="8" fill="#193651"/>
  <circle cx="720" cy="800" r="8" fill="#193651"/>

  <!-- Right side: Colored official-style social media icons -->
  <g id="social-icons">
    <!-- Facebook -->
    <g transform="translate(1180,180)">
      <circle cx="60" cy="60" r="60" fill="#1877F2"/>
      <text x="60" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="100" fill="#ffffff" font-weight="bold">f</text>
    </g>

    <!-- LinkedIn -->
    <g transform="translate(1320,180)">
      <rect x="0" y="0" width="120" height="120" rx="24" fill="#0A66C2"/>
      <text x="60" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="74" fill="#ffffff" font-weight="bold">in</text>
    </g>

    <!-- Instagram -->
    <g transform="translate(1180,420)">
      <rect x="0" y="0" width="120" height="120" rx="30" fill="url(#instaGrad)"/>
      <rect x="18" y="18" width="84" height="84" rx="24" fill="none" stroke="#ffffff" stroke-width="8"/>
      <circle cx="90" cy="32" r="10" fill="#ffffff"/>
      <circle cx="60" cy="60" r="22" fill="none" stroke="#ffffff" stroke-width="8"/>
    </g>

    <!-- X (Twitter) -->
    <g transform="translate(1360,420)">
      <rect x="-10" y="-10" width="140" height="140" fill="none"/>
      <path d="M0 0 L120 120" stroke="#000000" stroke-width="18" stroke-linecap="round"/>
      <path d="M120 0 L0 120" stroke="#000000" stroke-width="18" stroke-linecap="round"/>
    </g>

    <!-- YouTube -->
    <g transform="translate(1240,620)">
      <rect x="0" y="0" width="180" height="110" rx="24" fill="#FF0000"/>
      <polygon points="72,25 72,85 132,55" fill="#ffffff"/>
    </g>
  </g>
</svg>
